model:
  model_id: "Qwen/Qwen2.5-VL-3B-Instruct"
  max_length: 1024
  torch_dtype: "bfloat16"
  min_pixels: 200704
  max_pixels: 401408

data:
  raw_jsonl: "vlm_dataset/train_20000.jsonl"
  processed_dir: "vlm_dataset/processed"
  train_jsonl: "vlm_dataset/processed/train.jsonl"
  val_jsonl: "vlm_dataset/processed/val.jsonl"
  image_dir: "vlm_dataset/images"
  val_ratio: 0.05
  num_workers: 4
  seed: 42

training:
  output_dir: "checkpoints/qwen2vl-scientific-writer"
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.05
  logging_steps: 10
  save_steps: 100
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"
  auto_resume: false
  resume_from: null

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  modules_to_save:
    - "lm_head"
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

wandb:
  enabled: true
  project: "vlm-scientific-writer"
  run_name: null