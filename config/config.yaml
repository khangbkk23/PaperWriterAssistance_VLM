model:
  model_id: "Qwen/Qwen2.5-VL-3B-Instruct"
  max_length: 768
  torch_dtype: "bfloat16"

data:
  dataset_path: "vlm_dataset/train_20k.jsonl"
  image_dir: "vlm_dataset/images"

training:
  output_dir: "checkpoints/qwen2vl-scientific-writer"
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 0.0002
  weight_decay: 0.01
  warmup_ratio: 0.05
  logging_steps: 10
  save_steps: 100
  gradient_checkpointing: true
  optim: "paged_adamw_8bit"

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"